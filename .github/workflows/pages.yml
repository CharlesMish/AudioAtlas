name: Live demo

"on":
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: audioatlas-pages
  cancel-in-progress: true

env:
  MPLBACKEND: Agg
  PYTHONUTF8: "1"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install decoder and AudioAtlas
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libsndfile1
          python -m pip install --upgrade pip
          python -m pip install .

      - name: Generate share-safe AudioAtlas demo report
        run: |
          audioatlas analyze examples/demo_audio/audioatlas_demo.wav \
            --out site \
            --graphs-profile standard \
            --theme midnight_studio
          mv site/report.html site/index.html
          touch site/.nojekyll

      - name: Verify static demo boundary
        shell: python
        run: |
          import json
          import re
          from pathlib import Path

          site = Path("site")
          allowed_suffixes = {".html", ".md", ".json", ".png"}
          files = [path for path in site.rglob("*") if path.name != ".nojekyll"]
          assert files
          assert not any(path.is_symlink() for path in site.rglob("*"))
          assert all(path.is_file() for path in files)
          assert all(path.suffix.lower() in allowed_suffixes for path in files)
          assert not list(site.rglob("*.wav"))

          summary = json.loads((site / "summary.json").read_text(encoding="utf-8"))
          assert summary["metadata"]["filename"] == "audioatlas_demo.wav"
          assert summary["metadata"]["path_kind"] == "basename"
          assert summary["metadata"]["local_paths_included"] is False
          assert summary["graphs"]["profile"] == "standard"
          assert len(summary["graphs"]["selected_filenames"]) == 14
          html = (site / "index.html").read_text(encoding="utf-8")
          assert "--bg: #0b1120;" in html
          assert 'data-presentation="studio"' in html
          forbidden = (
              "/home/runner/",
              "C:\\Users\\",
              "file://",
              "fetch(",
              "XMLHttpRequest",
          )
          for path in files:
              if path.suffix.lower() not in {".html", ".md", ".json"}:
                  continue
              text = path.read_text(encoding="utf-8")
              assert not any(value in text for value in forbidden), path
              if path.suffix.lower() == ".html":
                  assert not re.search(
                      r"<(?:script|link)[^>]+(?:src|href)=[\"']https?://", text
                  ), path
          for filename in summary["graphs"]["selected_filenames"]:
              assert (site / filename).is_file(), filename

      - uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
      - name: Deploy live report
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
