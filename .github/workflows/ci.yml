name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: System deps for soundfile + librosa
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libsndfile1

      - name: Install package (with dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Tests (pytest)
        run: pytest -v

      - name: Smoke-test the CLI on the golden fixture
        run: |
          audioatlas analyze tests/fixtures/sine_1k_-6dbfs_2s.wav \
            --out /tmp/aa_ci_demo
          test -f /tmp/aa_ci_demo/summary.json
          test -f /tmp/aa_ci_demo/report.md
          test -f /tmp/aa_ci_demo/report.html
          test -f /tmp/aa_ci_demo/01_waveform_rms.png
          audioatlas sections tests/fixtures/sine_1k_-6dbfs_2s.wav \
            --out /tmp/aa_ci_sections \
            --section first:0:1 \
            --section second:1:
          test -f /tmp/aa_ci_sections/section_index.md
