version: 2
updates:
  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Chicago
    groups:
      python-nonbreaking:
        patterns: ["*"]
        update-types: [minor, patch]
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:30"
      timezone: America/Chicago
    groups:
      actions-nonbreaking:
        patterns: ["*"]
        update-types: [minor, patch]
    open-pull-requests-limit: 5
