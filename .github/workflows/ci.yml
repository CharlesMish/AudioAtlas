name: CI

"on":
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: audioatlas-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MPLBACKEND: Agg
  PYTHONUTF8: "1"

jobs:
  test:
    name: Tests · Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install system decoder library
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libsndfile1

      - name: Install package and test tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest -v

  quality:
    name: Lint and package metadata
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install development tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]" build twine

      - name: Lint
        run: ruff check .

      - name: Verify public snapshot
        run: python scripts/verify_public_snapshot.py

      - name: Build source and wheel distributions
        run: python -m build

      - name: Check distribution metadata
        run: python -m twine check dist/*

      - name: Run tests distributed in the source archive
        shell: bash
        run: |
          mkdir -p /tmp/audioatlas-sdist-smoke
          tar -xzf dist/audioatlas-*.tar.gz -C /tmp/audioatlas-sdist-smoke
          cd /tmp/audioatlas-sdist-smoke/audioatlas-*
          python -m pytest

      - name: Install wheel into a clean environment
        shell: bash
        run: |
          python -m venv /tmp/audioatlas-wheel-smoke
          /tmp/audioatlas-wheel-smoke/bin/python -m pip install --upgrade pip
          /tmp/audioatlas-wheel-smoke/bin/python -m pip install dist/*.whl
          /tmp/audioatlas-wheel-smoke/bin/audioatlas --version
          /tmp/audioatlas-wheel-smoke/bin/audioatlas themes
          /tmp/audioatlas-wheel-smoke/bin/audioatlas analyze \
            tests/fixtures/sine_1k_-6dbfs_2s.wav \
            --out /tmp/audioatlas-wheel-report \
            --graphs-profile compact \
            --track-id ci-golden
          /tmp/audioatlas-wheel-smoke/bin/audioatlas diff \
            /tmp/audioatlas-wheel-report \
            /tmp/audioatlas-wheel-report \
            --out /tmp/audioatlas-wheel-diff
          /tmp/audioatlas-wheel-smoke/bin/audioatlas project init \
            /tmp/audioatlas-wheel-project \
            --name "Wheel project" \
            --graphs-profile compact
          /tmp/audioatlas-wheel-smoke/bin/audioatlas project add \
            /tmp/audioatlas-wheel-project \
            tests/fixtures/sine_1k_-6dbfs_2s.wav \
            --label "Mix 1"
          /tmp/audioatlas-wheel-smoke/bin/python - <<'PY'
          import json
          from importlib.metadata import version
          from pathlib import Path

          assert version('numba').startswith('0.65.')
          out = Path('/tmp/audioatlas-wheel-report')
          required = {
              '.audioatlas-output.json',
              'summary.json',
              'findings.json',
              'report.md',
              'report.html',
          }
          assert required <= {path.name for path in out.iterdir()}
          assert len(list(out.glob('*.png'))) == 4
          summary = json.loads((out / 'summary.json').read_text(encoding='utf-8'))
          assert summary['schema_version'] == '0.2.1'
          assert summary['graphs']['profile'] == 'compact'
          assert summary['metadata']['path_kind'] == 'basename'
          assert len(summary['analysis_provenance']['compatible_analysis_sha256']) == 64
          assert len(summary['source_identity']['track_id_sha256']) == 64
          diff = Path('/tmp/audioatlas-wheel-diff')
          assert {'revision_diff.json', 'revision_diff.md', 'revision_diff.html'} <= {
              path.name for path in diff.iterdir()
          }
          diff_payload = json.loads(
              (diff / 'revision_diff.json').read_text(encoding='utf-8')
          )
          assert diff_payload['schema_version'] == '0.1.0'
          assert diff_payload['comparability']['status'] == 'exact'
          project = Path('/tmp/audioatlas-wheel-project')
          project_payload = json.loads((project / 'project.json').read_text(encoding='utf-8'))
          assert project_payload['schema_version'] == '0.1.0'
          assert len(project_payload['revisions']) == 1
          assert (project / project_payload['revisions'][0]['report'] / 'report.html').is_file()
          PY

  platform-smoke:
    name: CLI smoke · ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install .

      - name: Run compact report smoke
        run: |
          audioatlas --version
          audioatlas themes
          audioatlas analyze tests/fixtures/sine_1k_-6dbfs_2s.wav --out aa_platform_report --graphs-profile compact --track-id platform-golden
          audioatlas diff aa_platform_report aa_platform_report --out aa_platform_diff
          audioatlas project init aa_platform_project --name "Platform project" --graphs-profile compact
          audioatlas project add aa_platform_project tests/fixtures/sine_1k_-6dbfs_2s.wav --label "Mix 1"

      - name: Verify generated contract
        shell: python
        run: |
          import json
          from pathlib import Path

          out = Path('aa_platform_report')
          required = {
              '.audioatlas-output.json',
              'summary.json',
              'findings.json',
              'report.md',
              'report.html',
          }
          names = {path.name for path in out.iterdir()}
          assert required <= names, required - names
          assert len(list(out.glob('*.png'))) == 4
          summary = json.loads((out / 'summary.json').read_text(encoding='utf-8'))
          assert summary['metadata']['path_kind'] == 'basename'
          assert summary['schema_version'] == '0.2.1'
          assert summary['graphs']['profile'] == 'compact'
          assert len(summary['analysis_provenance']['compatible_analysis_sha256']) == 64
          assert len(summary['source_identity']['track_id_sha256']) == 64
          diff = Path('aa_platform_diff')
          assert (diff / 'revision_diff.json').is_file()
          payload = json.loads((diff / 'revision_diff.json').read_text(encoding='utf-8'))
          assert payload['schema_version'] == '0.1.0'
          assert payload['comparability']['status'] == 'exact'
          project = Path('aa_platform_project')
          project_payload = json.loads((project / 'project.json').read_text(encoding='utf-8'))
          assert project_payload['schema_version'] == '0.1.0'
          assert len(project_payload['revisions']) == 1
          assert (project / project_payload['revisions'][0]['report'] / 'report.html').is_file()

  dependency-audit:
    name: Runtime dependency audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"

      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7

      - name: Export and audit the locked runtime dependency set
        run: |
          uv sync --locked --extra dev
          uv export --locked --no-dev --no-emit-project \
            --format requirements-txt \
            --output-file /tmp/audioatlas-runtime-requirements.txt
          uv run --locked pip-audit --require-hashes \
            -r /tmp/audioatlas-runtime-requirements.txt
