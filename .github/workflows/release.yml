name: Release

"on":
  push:
    tags: ["v*"]

permissions:
  contents: read
  actions: read

concurrency:
  group: audioatlas-release-${{ github.ref }}
  cancel-in-progress: false

env:
  AUDIOATLAS_BUNDLE_BUILD_NUMBER: ${{ github.run_number }}
  MACOSX_DEPLOYMENT_TARGET: "14.0"
  MPLBACKEND: Agg
  PYTHONUTF8: "1"

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    outputs:
      version: ${{ steps.package.outputs.version }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7

      - name: Install release tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libsndfile1 zip
          uv sync --locked --extra dev

      - name: Record and verify release identity
        id: package
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          version="$(uv run python -c 'import audioatlas; print(audioatlas.__version__)')"
          test "${GITHUB_REF_NAME}" = "v${version}"
          git fetch origin main
          git merge-base --is-ancestor "${GITHUB_SHA}" origin/main
          successful_preflights="$(gh api \
            "repos/${GITHUB_REPOSITORY}/actions/workflows/testpypi.yml/runs?head_sha=${GITHUB_SHA}&status=success&per_page=1" \
            --jq '.total_count')"
          test "${successful_preflights}" -gt 0
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Run release gates
        run: |
          uv run pytest
          uv run ruff check .
          uv run python scripts/verify_public_snapshot.py
          uv export --locked --no-dev --no-emit-project \
            --format requirements-txt \
            --output-file /tmp/audioatlas-runtime-requirements.txt
          uv run pip-audit --require-hashes -r /tmp/audioatlas-runtime-requirements.txt
          uv run python -m build
          uv run python -m twine check dist/*

      - name: Build release extras and checksums
        shell: bash
        run: |
          version="${{ steps.package.outputs.version }}"
          uv run audioatlas analyze examples/demo_audio/guitar.wav \
            --out "AudioAtlas-${version}-sample-report" \
            --graphs-profile standard
          zip -qr "dist/AudioAtlas-${version}-sample-report.zip" \
            "AudioAtlas-${version}-sample-report"
          git archive --format=zip \
            --prefix="AudioAtlas-${version}-public-source/" \
            --output="dist/AudioAtlas-${version}-public-source.zip" HEAD
          cd dist
          shasum -a 256 * > "AudioAtlas-${version}-SHA256SUMS.txt"

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: audioatlas-python-dist
          path: |
            dist/*.whl
            dist/*.tar.gz
          if-no-files-found: error
          retention-days: 30

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: audioatlas-release
          path: dist/*
          if-no-files-found: error
          retention-days: 30

  macos-app:
    needs: prepare
    runs-on: macos-14
    timeout-minutes: 45
    environment:
      name: macos-release
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
          architecture: arm64
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7

      - name: Install app build dependencies
        run: uv sync --locked --extra app-build

      - name: Preflight signing and notarization credentials
        env:
          CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
          MACOS_TEAM_ID: ${{ secrets.MACOS_TEAM_ID }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        shell: bash
        run: |
          test -n "${CERTIFICATE_P12}"
          test -n "${CERTIFICATE_PASSWORD}"
          test -n "${MACOS_SIGNING_IDENTITY}"
          test -n "${MACOS_TEAM_ID}"
          test -n "${APPLE_API_KEY_P8}"
          test -n "${APPLE_API_KEY_ID}"
          test -n "${APPLE_API_ISSUER_ID}"

      - name: Import Developer ID certificate
        env:
          CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
          MACOS_TEAM_ID: ${{ secrets.MACOS_TEAM_ID }}
        shell: bash
        run: |
          test -n "${CERTIFICATE_P12}"
          test -n "${CERTIFICATE_PASSWORD}"
          test -n "${MACOS_SIGNING_IDENTITY}"
          test -n "${MACOS_TEAM_ID}"
          keychain="${RUNNER_TEMP}/audioatlas-signing.keychain-db"
          certificate="${RUNNER_TEMP}/audioatlas-certificate.p12"
          password="$(openssl rand -hex 24)"
          echo "${CERTIFICATE_P12}" | base64 --decode > "${certificate}"
          security create-keychain -p "${password}" "${keychain}"
          security set-keychain-settings -lut 21600 "${keychain}"
          security unlock-keychain -p "${password}" "${keychain}"
          security import "${certificate}" -P "${CERTIFICATE_PASSWORD}" \
            -T /usr/bin/codesign -t cert -f pkcs12 -k "${keychain}"
          security set-key-partition-list -S apple-tool:,apple: \
            -k "${password}" "${keychain}"
          security list-keychains -d user -s "${keychain}"

      - name: Build and verify signed app
        env:
          AUDIOATLAS_CODESIGN_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
          MACOS_TEAM_ID: ${{ secrets.MACOS_TEAM_ID }}
        run: |
          uv run python scripts/build_macos_app.py
          uv run audioatlas analyze tests/fixtures/sine_1k_-6dbfs_2s.wav \
            --out /tmp/audioatlas-signed-wheel-parity --graphs-profile standard \
            --theme default --presentation studio
          uv run audioatlas analyze examples/demo_audio/audioatlas_demo.wav \
            --out /tmp/audioatlas-signed-demo-wheel-parity --graphs-profile standard \
            --theme default --presentation studio
          dist/macos/AudioAtlas.app/Contents/MacOS/AudioAtlas \
            --smoke-analyze tests/fixtures/sine_1k_-6dbfs_2s.wav \
            --output-parent /tmp/audioatlas-signed-app-smoke
          dist/macos/AudioAtlas.app/Contents/MacOS/AudioAtlas \
            --smoke-analyze examples/demo_audio/audioatlas_demo.wav \
            --output-parent /tmp/audioatlas-signed-demo-app-smoke
          codesign --verify --deep --strict --verbose=2 dist/macos/AudioAtlas.app
          signing_details="$(codesign -dvvv dist/macos/AudioAtlas.app 2>&1)"
          grep -F "Identifier=com.charlesmish.audioatlas" <<<"${signing_details}"
          grep -F "TeamIdentifier=${MACOS_TEAM_ID}" <<<"${signing_details}"
          grep -F "Authority=Developer ID Application:" <<<"${signing_details}"
          grep -E "flags=.*runtime" <<<"${signing_details}"
          grep -F "Timestamp=" <<<"${signing_details}"
          codesign -d --entitlements :- dist/macos/AudioAtlas.app \
            > "${RUNNER_TEMP}/audioatlas-entitlements.plist"
          test "$(plutil -extract com.apple.security.cs.allow-jit raw \
            "${RUNNER_TEMP}/audioatlas-entitlements.plist")" = "true"
          test "$(plutil -extract com.apple.security.cs.allow-unsigned-executable-memory raw \
            "${RUNNER_TEMP}/audioatlas-entitlements.plist")" = "true"
          ! plutil -extract com.apple.security.get-task-allow raw \
            "${RUNNER_TEMP}/audioatlas-entitlements.plist" >/dev/null 2>&1
          python - <<'PY'
          import json
          from pathlib import Path

          wheel = json.loads(Path('/tmp/audioatlas-signed-wheel-parity/summary.json').read_text())
          frozen = json.loads(Path(
              '/tmp/audioatlas-signed-app-smoke/AudioAtlas Report – sine_1k_-6dbfs_2s/summary.json'
          ).read_text())
          assert frozen == wheel
          demo_wheel = json.loads(Path(
              '/tmp/audioatlas-signed-demo-wheel-parity/summary.json'
          ).read_text())
          demo_frozen = json.loads(Path(
              '/tmp/audioatlas-signed-demo-app-smoke/AudioAtlas Report – audioatlas_demo/summary.json'
          ).read_text())
          assert demo_frozen == demo_wheel
          PY

      - name: Create, notarize, and staple DMG
        env:
          SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
          MACOS_TEAM_ID: ${{ secrets.MACOS_TEAM_ID }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        shell: bash
        run: |
          test -n "${SIGNING_IDENTITY}"
          test -n "${APPLE_API_KEY_P8}"
          test -n "${APPLE_API_KEY_ID}"
          test -n "${APPLE_API_ISSUER_ID}"
          version="${{ needs.prepare.outputs.version }}"
          dmg="AudioAtlas-${version}-macOS-arm64.dmg"
          key="${RUNNER_TEMP}/AuthKey_${APPLE_API_KEY_ID}.p8"
          echo "${APPLE_API_KEY_P8}" | base64 --decode > "${key}"
          python scripts/package_macos_dmg.py \
            --app dist/macos/AudioAtlas.app \
            --dmg "${dmg}" \
            --version "${version}" \
            --build-number "${AUDIOATLAS_BUNDLE_BUILD_NUMBER}" \
            --commit "${GITHUB_SHA}" \
            --workflow-url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            --signing-team "${MACOS_TEAM_ID}" \
            --signing-identity "${SIGNING_IDENTITY}" \
            --api-key "${key}" \
            --api-key-id "${APPLE_API_KEY_ID}" \
            --api-issuer-id "${APPLE_API_ISSUER_ID}" \
            --submission-json notarization-submission.json \
            --notarization-log notarization-log.json \
            --manifest macos-distribution-manifest.json

      - name: Clean signing material
        if: always()
        shell: bash
        run: |
          security delete-keychain "${RUNNER_TEMP}/audioatlas-signing.keychain-db" \
            >/dev/null 2>&1 || true
          rm -f "${RUNNER_TEMP}/audioatlas-certificate.p12"
          rm -f "${RUNNER_TEMP}"/AuthKey_*.p8
          rm -f "${RUNNER_TEMP}/audioatlas-entitlements.plist"

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: audioatlas-macos-notarization-evidence-${{ github.run_number }}
          path: |
            notarization-submission.json
            notarization-log.json
          if-no-files-found: warn
          retention-days: 30

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: audioatlas-macos-app
          path: |
            AudioAtlas-*-macOS-arm64.dmg
            AudioAtlas-*-macOS-arm64.dmg.sha256
            notarization-submission.json
            notarization-log.json
            macos-distribution-manifest.json
          if-no-files-found: error
          retention-days: 30

  macos-evidence:
    needs: [prepare, macos-app]
    runs-on: macos-14
    timeout-minutes: 10
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: audioatlas-macos-app
          path: dist
      - name: Verify notarized DMG evidence artifacts
        run: |
          set -euo pipefail
          shopt -s nullglob
          dmgs=(dist/AudioAtlas-*-macOS-arm64.dmg)
          if (( ${#dmgs[@]} != 1 )); then
            echo "Expected one DMG artifact, found ${#dmgs[@]}" >&2
            exit 1
          fi
          dmg="${dmgs[0]}"

          manifest_path="dist/macos-distribution-manifest.json"
          log_path="dist/notarization-log.json"
          submission_path="dist/notarization-submission.json"
          hash_path="${dmg}.sha256"
          test -s "${manifest_path}"
          test -s "${log_path}"
          test -s "${submission_path}"
          test -s "${hash_path}"

          python - "${dmg}" <<'PY'
          import hashlib
          import json
          import sys
          from pathlib import Path

          dmg_path = Path(sys.argv[1])
          manifest_path = Path("dist/macos-distribution-manifest.json")
          log = json.loads((Path("dist/notarization-log.json")).read_text(encoding="utf-8"))
          submission = json.loads((Path("dist/notarization-submission.json")).read_text(encoding="utf-8"))
          manifest = json.loads(manifest_path.read_text(encoding="utf-8"))
          manifest_fields = {
            "schema_version",
            "candidate_id",
            "version",
            "bundle_build",
            "commit",
            "architecture",
            "minimum_macos",
            "bundle_identifier",
            "workflow_url",
            "dmg_filename",
            "dmg_sha256",
            "notarization_submission_id",
            "notarytool_id",
            "notarization_status",
            "signing_team",
            "built_at",
          }
          missing_manifest_fields = [field for field in manifest_fields if field not in manifest]
          if missing_manifest_fields:
            raise SystemExit(
              f"manifest missing required fields: {missing_manifest_fields!r}"
            )

          if not isinstance(submission, dict):
            raise SystemExit("notary submission is not an object")
          if not isinstance(submission.get("id"), str) or not submission["id"]:
            raise SystemExit("notary submission id is missing or empty")
          if submission.get("status") != "Accepted":
            raise SystemExit("notary submission status is not Accepted")

          if not isinstance(log, dict):
            raise SystemExit("notary log is not an object")
          if log.get("status") != "Accepted":
            raise SystemExit("notary log status is not Accepted")
          if log.get("id") != manifest.get("notarization_submission_id"):
            raise SystemExit("notary log id does not match manifest submission id")
          if not isinstance(log.get("createdDate"), str) or not log["createdDate"]:
            raise SystemExit("notary log createdDate is missing")
          if not isinstance(log.get("issues"), list) or log["issues"]:
            raise SystemExit("notary log has unresolved issues")
          if manifest.get("schema_version") != 1:
            raise SystemExit("manifest schema_version is unexpected")
          if manifest.get("notarization_status") != log.get("status"):
            raise SystemExit("manifest notarization_status mismatch")
          if manifest.get("notarization_submission_id") != submission.get("id"):
            raise SystemExit("manifest submission id mismatch")

          expected_hash = manifest.get("dmg_sha256")
          if not isinstance(expected_hash, str) or len(expected_hash) != 64:
            raise SystemExit("manifest dmg_sha256 is missing or malformed")
          with dmg_path.open("rb") as stream:
            observed = hashlib.sha256(stream.read()).hexdigest()
          if expected_hash != observed:
            raise SystemExit("manifest hash does not match DMG file")
          expected_line = f"{manifest['dmg_sha256']}  {manifest['dmg_filename']}"
          checksum = Path(f"{dmg_path}.sha256").read_text(encoding="utf-8").strip()
          if checksum != expected_line:
            raise SystemExit("checksum file does not match manifest")
          if dmg_path.name != manifest.get("dmg_filename"):
            raise SystemExit("manifest filename does not match packaged DMG filename")
          PY

          codesign --verify --deep --strict --verbose=2 "${dmg}"
          xcrun stapler validate "${dmg}"
          spctl --assess --type open --context context:primary-signature --verbose=2 "${dmg}"

  macos-acceptance:
    needs: [prepare, macos-app, macos-evidence]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: macos-acceptance
    steps:
      - name: Record clean-Mac acceptance gate
        run: |
          cat >> "${GITHUB_STEP_SUMMARY}" <<'EOF'
          ## Required macOS acceptance
          Approval confirms the notarized DMG was tested on a separate macOS 14+
          Apple Silicon account as a fresh install, upgrade, duplicate copy, from
          the mounted DMG, from Applications, and offline after stapling.
          EOF

  index-state:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      publish_needed: ${{ steps.index.outputs.publish_needed }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: audioatlas-python-dist
          path: dist
      - name: Compare prepared files with PyPI
        id: index
        run: |
          python scripts/check_package_index.py \
            --index-json-url https://pypi.org/pypi/audioatlas/json \
            --dist-dir dist \
            --version "${{ needs.prepare.outputs.version }}"

  draft-release:
    needs: [prepare, macos-app, macos-acceptance]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-release
      url: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}
    permissions:
      contents: write
      actions: read

    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: audioatlas-release
          path: dist
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: audioatlas-macos-app
          path: dist
      - name: Create or refresh GitHub prerelease draft
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" dist/* \
              --repo "${GITHUB_REPOSITORY}" --clobber
            gh release edit "${GITHUB_REF_NAME}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "AudioAtlas ${GITHUB_REF_NAME}" \
              --prerelease
          else
            gh release create "${GITHUB_REF_NAME}" dist/* \
              --repo "${GITHUB_REPOSITORY}" \
              --title "AudioAtlas ${GITHUB_REF_NAME}" \
              --generate-notes \
              --draft \
              --prerelease \
              --verify-tag
          fi

  pypi:
    needs: [prepare, index-state, draft-release]
    if: needs.index-state.outputs.publish_needed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: pypi
      url: https://pypi.org/p/audioatlas
    permissions:
      actions: read
      id-token: write

    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: audioatlas-python-dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1

  verify-index:
    needs: [prepare, index-state, draft-release, pypi]
    if: ${{ always() && needs.prepare.result == 'success' && needs.index-state.result == 'success' && needs.draft-release.result == 'success' && (needs.pypi.result == 'success' || needs.pypi.result == 'skipped') }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: audioatlas-python-dist
          path: dist
      - name: Wait for exact PyPI files and digests
        shell: bash
        run: |
          for attempt in {1..18}; do
            if python scripts/check_package_index.py \
              --index-json-url https://pypi.org/pypi/audioatlas/json \
              --dist-dir dist \
              --version "${{ needs.prepare.outputs.version }}" \
              --require-present \
              --provenance-base-url https://pypi.org/integrity/audioatlas; then
              exit 0
            fi
            if [ "$attempt" -eq 18 ]; then
              exit 1
            fi
            sleep 10
          done

  pypi-smoke:
    needs: [prepare, verify-index]
    name: PyPI smoke · ${{ matrix.os }} · Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.11"
          - os: macos-latest
            python-version: "3.13"
          - os: windows-latest
            python-version: "3.14"

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Linux decoder library
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libsndfile1
      - name: Install exact PyPI release
        run: |
          python -m pip install --upgrade pip
          python -m pip install "audioatlas==${{ needs.prepare.outputs.version }}"
          audioatlas --version
          audioatlas themes
      - name: Exercise report, diff, and project workflows
        run: |
          audioatlas analyze tests/fixtures/sine_1k_-6dbfs_2s.wav --out aa_pypi_report --graphs-profile compact --track-id pypi-smoke
          audioatlas diff aa_pypi_report aa_pypi_report --out aa_pypi_diff
          audioatlas project init aa_pypi_project --name "PyPI smoke" --graphs-profile compact
          audioatlas project add aa_pypi_project tests/fixtures/sine_1k_-6dbfs_2s.wav --label "Mix 1"

  finalize-release:
    needs: [prepare, verify-index, pypi-smoke]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: github-release
      url: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}
    permissions:
      contents: write

    steps:
      - name: Publish GitHub prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release edit "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --draft=false \
            --prerelease
