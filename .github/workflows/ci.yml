name: CI

"on":
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: audioatlas-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MPLBACKEND: Agg
  PYTHONUTF8: "1"

jobs:
  test:
    name: Tests · Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install system decoder library
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libsndfile1

      - name: Install package and test tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest -v

  quality:
    name: Lint and package metadata
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install development tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]" build twine

      - name: Lint
        run: ruff check .

      - name: Build source and wheel distributions
        run: python -m build

      - name: Check distribution metadata
        run: python -m twine check dist/*

      - name: Install wheel into a clean environment
        shell: bash
        run: |
          python -m venv /tmp/audioatlas-wheel-smoke
          /tmp/audioatlas-wheel-smoke/bin/python -m pip install --upgrade pip
          /tmp/audioatlas-wheel-smoke/bin/python -m pip install dist/*.whl
          /tmp/audioatlas-wheel-smoke/bin/audioatlas --version
          /tmp/audioatlas-wheel-smoke/bin/audioatlas themes
          /tmp/audioatlas-wheel-smoke/bin/audioatlas analyze \
            tests/fixtures/sine_1k_-6dbfs_2s.wav \
            --out /tmp/audioatlas-wheel-report \
            --graphs-profile minimal
          /tmp/audioatlas-wheel-smoke/bin/python - <<'PY'
          import json
          from pathlib import Path

          out = Path('/tmp/audioatlas-wheel-report')
          required = {
              '.audioatlas-output.json',
              'summary.json',
              'findings.json',
              'report.md',
              'report.html',
          }
          assert required <= {path.name for path in out.iterdir()}
          assert len(list(out.glob('*.png'))) == 4
          summary = json.loads((out / 'summary.json').read_text(encoding='utf-8'))
          assert summary['schema_version'] == '0.2.0'
          assert summary['metadata']['path_kind'] == 'basename'
          PY

  platform-smoke:
    name: CLI smoke · ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install .

      - name: Run compact report smoke
        run: |
          audioatlas --version
          audioatlas themes
          audioatlas analyze tests/fixtures/sine_1k_-6dbfs_2s.wav --out aa_platform_report --graphs-profile minimal

      - name: Verify generated contract
        shell: python
        run: |
          import json
          from pathlib import Path

          out = Path('aa_platform_report')
          required = {
              '.audioatlas-output.json',
              'summary.json',
              'findings.json',
              'report.md',
              'report.html',
          }
          names = {path.name for path in out.iterdir()}
          assert required <= names, required - names
          assert len(list(out.glob('*.png'))) == 4
          summary = json.loads((out / 'summary.json').read_text(encoding='utf-8'))
          assert summary['metadata']['path_kind'] == 'basename'
